<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Projects</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: white;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: #020617;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
}

/* Title */
.title {
    text-align: center;
    margin-top: 50px;
}

.title h1 {
    font-size: 40px;
}

/* Projects Grid */
.projects {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 50px;
    flex-wrap: wrap;
}

/* Card */
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card h2 {
    margin-bottom: 10px;
}

.card p {
    color: #ccc;
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: linear-gradient(45deg, #22c55e, #4ade80);
    color: black;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<nav>
    <h2>🔥 Tiger</h2>
    <div>
        <a href="index.html">Home</a>
    </div>
</nav>

<div class="title">
    <h1>🚀 My Projects</h1>
</div>

<div class="projects">

    <div class="card">
        <h2>Project 1</h2>
        <p>My first project</p>
        <a href="project1.html" class="btn">View Project</a>
    </div>

    <!-- تضيف مشاريع تانية هنا -->

</div>

<div style="text-align:center; margin-top:50px;">
    <a href="index.html">⬅ Back to Home</a>
</div>

</body>
</html>
