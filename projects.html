<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects | Tiger X</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
}

/* MATRIX */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* HEADER */
header{
  text-align:center;
  padding:30px;
  text-shadow:0 0 10px #0f0;
}

/* TERMINAL */
.terminal{
  width:85%;
  margin:auto;
  border:1px solid #0f0;
  padding:15px;
  height:180px;
  overflow-y:auto;
}

/* GRID */
.container{
  width:85%;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  border:1px solid #0f0;
  padding:20px;
  transition:.3s;
}

.card:hover{
  background:#001100;
  transform:scale(1.05);
}

a{
  color:#0f0;
  text-decoration:none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<header>
<h1>projects@tigerx:~#</h1>
<p>Project Database</p>
</header>

<div class="terminal">
<div>> Fetching projects...</div>
<div>> Loaded ✔</div>
</div>

<div class="container">

<div class="card">
<h2>Project One</h2>
<p>Advanced UI System</p>
<a href="project1.html">Open</a>
</div>

<div class="card">
<h2>Project Two</h2>
<p>Coming Soon...</p>
</div>

<div class="card">
<h2>Tools</h2>
<p>Security mini tools (soon)</p>
</div>

</div>

<div style="text-align:center;margin:20px;">
<a href="index.html">⬅ Back to Home</a>
</div>

<script>
/* MATRIX */
let c=document.getElementById("matrix");
let ctx=c.getContext("2d");

c.height=window.innerHeight;
c.width=window.innerWidth;

let letters="01";
let fontSize=14;
let columns=c.width/fontSize;
let drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>c.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);
</script>

</body>
</html>
