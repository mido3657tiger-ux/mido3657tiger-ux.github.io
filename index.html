<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVADEV • Secure Access</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

h1{
  text-shadow:0 0 10px #0f0;
}

input{
  background:black;
  border:1px solid #00ff00;
  color:#00ff00;
  padding:10px;
  margin:10px;
  width:220px;
  text-align:center;
}

button{
  padding:10px 25px;
  background:#00ff00;
  border:none;
  cursor:pointer;
}

#msg{
  margin-top:15px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>SECURE TERMINAL</h1>

  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">ENTER</button>

  <div id="msg"></div>
</div>

<script>
async function login(){
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerHTML = "CONNECTING...";

  try{
    const res = await fetch("http://localhost:3000/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if(res.status === 200){
      localStorage.setItem("token", data.token); // 🔥 حفظ الجلسة
      msg.innerHTML = "ACCESS GRANTED 🔓";

      setTimeout(()=>{
        window.location.href = "dashboard.html";
      },1000);

    }else{
      msg.innerHTML = "ACCESS DENIED ❌";
    }

  }catch{
    msg.innerHTML = "SERVER ERROR ⚠️";
  }
}
</script>
