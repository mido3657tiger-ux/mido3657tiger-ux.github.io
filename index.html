<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger X | Beast Mode</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* BOOT SCREEN */
#boot{
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:20px;
}

/* TERMINAL */
#main{
  display:none;
  padding:20px;
}

.terminal{
  border:1px solid #00ff00;
  padding:15px;
  height:250px;
  overflow-y:auto;
}

input{
  width:100%;
  background:none;
  border:none;
  color:#00ff00;
  outline:none;
}

/* GLITCH */
.glitch{
  font-size:35px;
  text-shadow:0 0 10px #0f0;
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 0 red;}
  50%{text-shadow:-2px 0 blue;}
  100%{text-shadow:2px 0 green;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="boot">
<div>Booting system...</div>
<div>Loading modules...</div>
<div>Bypassing security...</div>
<div>Access Granted ✔</div>
</div>

<div id="main">
<h1 class="glitch">root@tigerx:~#</h1>

<div class="terminal" id="terminal">
<div>> System Ready</div>
</div>

<input id="cmd" placeholder="type command...">

</div>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
/* BOOT DELAY */
setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("main").style.display="block";
},3000);

/* TERMINAL */
let input=document.getElementById("cmd");
let term=document.getElementById("terminal");
let sound=document.getElementById("sound");

input.addEventListener("keypress",e=>{
if(e.key==="Enter"){
let val=input.value;
let line=document.createElement("div");
line.textContent="> "+val;
term.appendChild(line);

let res=document.createElement("div");

if(val==="whoami") res.textContent="Tiger X";
else if(val==="skills") res.textContent="HTML CSS JS | Cyber";
else if(val==="clear") term.innerHTML="";
else res.textContent="Command not found";

term.appendChild(res);
input.value="";
term.scrollTop=term.scrollHeight;
sound.play();
}
});

/* MATRIX */
let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01";
let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);
</script>

</body>
</html>
