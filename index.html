<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tiger Portfolio</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #111827;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        width: 300px;
    }

    h1 {
        margin-bottom: 10px;
        font-size: 32px;
    }

    p {
        color: #9ca3af;
        margin-bottom: 25px;
    }

    .btn {
        display: inline-block;
        padding: 12px 25px;
        background: #22c55e;
        color: black;
        text-decoration: none;
        border-radius: 10px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #16a34a;
        transform: scale(1.05);
    }
</style>

</head>

<body>

<div class="card">
    <h1>🔥 Tiger</h1>
    <p>Welcome to my portfolio</p>

    <a href="projects.html" class="btn">View My Projects</a>
</div>

</body>
</html>
