<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger X | Final Level</title>

<style>
:root{
  --bg:#000;
  --text:#00ff00;
  --accent:#00ff00;
}
.light{
  --bg:#f5f5f5;
  --text:#111;
  --accent:#0a0;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* BOOT */
#boot{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* MAIN */
#main{display:none;padding:20px;}

/* TERMINAL */
.terminal{
  border:1px solid var(--accent);
  height:250px;
  overflow-y:auto;
  padding:10px;
}

input{
  width:100%;
  background:none;
  border:none;
  color:var(--text);
  outline:none;
}

/* LOGIN */
#login{
  display:none;
  text-align:center;
  margin-top:50px;
}

button{
  background:var(--accent);
  border:none;
  padding:10px;
  cursor:pointer;
}

/* GLITCH */
.glitch{
  font-size:35px;
  animation:glitch 1s infinite;
}
@keyframes glitch{
  0%{text-shadow:2px 0 red;}
  50%{text-shadow:-2px 0 blue;}
  100%{text-shadow:2px 0 green;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="boot">
<div>Booting...</div>
<div>Loading Core...</div>
<div>System Ready ✔</div>
</div>

<div id="login">
<h2>Enter Access Key</h2>
<input id="key">
<button onclick="login()">Enter</button>
</div>

<div id="main">
<h1 class="glitch">root@tigerx:~#</h1>

<div class="terminal" id="term">
<div>> Ready</div>
</div>

<input id="cmd" placeholder="type command...">
</div>

<script>
/* BOOT */
setTimeout(()=>{
if(localStorage.getItem("auth")){
document.getElementById("main").style.display="block";
}else{
document.getElementById("login").style.display="block";
}
document.getElementById("boot").style.display="none";
},3000);

/* LOGIN */
function login(){
let k=document.getElementById("key").value;
if(k==="tigerx"){
localStorage.setItem("auth",true);
location.reload();
}else alert("Access Denied");
}

/* TERMINAL */
let cmd=document.getElementById("cmd");
let term=document.getElementById("term");

cmd.addEventListener("keypress",e=>{
if(e.key==="Enter"){
let v=cmd.value;
let line=document.createElement("div");
line.textContent="> "+v;
term.appendChild(line);

let res=document.createElement("div");

switch(v){
case "whoami": res.textContent="Tiger X"; break;
case "theme": document.body.classList.toggle("light"); res.textContent="Theme switched"; break;
case "projects": res.innerHTML="<a href='https://github.com'>GitHub Projects</a>"; break;
case "clear": term.innerHTML=""; break;
case "logout": localStorage.removeItem("auth"); location.reload(); break;
default: res.textContent="Command not found";
}

term.appendChild(res);
cmd.value="";
term.scrollTop=term.scrollHeight;
}
});

/* MATRIX */
let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01";
let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);
</script>

</body>
</html>
