<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVADEV • Secure Access</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

h1{
  text-shadow:0 0 10px #0f0;
}

input{
  background:black;
  border:1px solid #00ff00;
  color:#00ff00;
  padding:10px;
  margin:10px;
  width:220px;
  text-align:center;
  outline:none;
}

button{
  padding:10px 25px;
  background:#00ff00;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00cc00;
}

#msg{
  margin-top:15px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>SECURE TERMINAL</h1>

  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">ENTER</button>

  <div id="msg"></div>
</div>

<script>
/* ================= MATRIX EFFECT ================= */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++) drops[x] = 1;

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#0f0";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(draw, 33);

/* ================= LOGIN ================= */
async function login(){
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerHTML = "CONNECTING...";

  try{
    const res = await fetch("https://your-app.onrender.com/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if(res.status === 200){
      localStorage.setItem("token", data.token);
      msg.innerHTML = "ACCESS GRANTED 🔓";

      setTimeout(()=>{
        window.location.href = "dashboard.html";
      },1000);

    }else{
      msg.innerHTML = "ACCESS DENIED ❌";
    }

  }catch(err){
    msg.innerHTML = "SERVER ERROR ⚠️";
  }
}
</script>

</body>
</html>
