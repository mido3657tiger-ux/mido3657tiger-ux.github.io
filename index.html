<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0b1120;color:#fff}

/* NAV */
nav{display:flex;justify-content:space-between;padding:20px 40px;background:#020617}
nav a{color:#ccc;margin-left:20px;text-decoration:none}
nav a:hover{color:#22c55e}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation:fadeUp 1s ease;
}
.hero h1{font-size:60px}
.hero span{color:#22c55e}
.hero p{color:#aaa;margin:15px 0}

.btn{
  padding:14px 30px;
  background:linear-gradient(45deg,#22c55e,#4ade80);
  color:#000;
  border-radius:25px;
  text-decoration:none;
  transition:.3s;
}
.btn:hover{transform:scale(1.1);box-shadow:0 0 20px #22c55e}

/* SECTION */
.section{padding:80px 20px;text-align:center}
.cards{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:260px;
  transition:.3s;
}
.card:hover{transform:translateY(-10px)}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

footer{text-align:center;padding:20px;color:#777}
</style>
</head>

<body>

<nav>
<h2>🔥 NovaDev</h2>
<div>

<p>Frontend Developer • UI Builder</p>
<a href="projects.html" class="btn">View My Work</a>
</div>

<div class="section">
<h2>What I Do</h2>
<div class="cards">

<div class="card">
<h3>💻 Web Dev</h3>
<p>Modern responsive websites</p>
</div>

<div class="card">
<h3>🎨 UI Design</h3>
<p>Clean interfaces</p>
</div>

<div class="card">
<h3>⚡ Speed</h3>
<p>Fast performance</p>
</div>

</div>
</div>
