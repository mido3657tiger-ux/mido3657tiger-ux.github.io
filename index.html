<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVADEV | بوابة الوصول الآمن</title>
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #818cf8;
            --bg: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* حركات الخلفية */
        .bg-animate {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            border-radius: 50%;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .status-badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 30px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #94a3b8;
            padding-right: 5px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #0ea5e9, #6366f1);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
        }

        /* نظام التنبيهات */
        #message {
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="bg-animate"></div>
    
    <div class="login-container">
        <div class="logo">NOVADEV</div>
        <div class="status-badge">نظام المصادقة المشفر • V2.0</div>
        
        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="ادخل اسم المستخدم">
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button onclick="handleLogin()">تسجيل دخول آمن</button>
        
        <div id="message"></div>

        <div class="footer-text">
            محمي بواسطة نظام <a href="#">NOVADEV Core</a> © 2026
        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const msg = document.getElementById('message');
            
            if(user) {
                msg.style.color = "#38bdf8";
                msg.innerText = "جاري التحقق من التوكن واستجابة السيرفر...";
                // هنا يتم الربط مع الـ Backend بتاعك
            } else {
                msg.style.color = "#f87171";
                msg.innerText = "يرجى إدخال البيانات المطلوبة";
            }
        }
    </script>
</body>
</html>
