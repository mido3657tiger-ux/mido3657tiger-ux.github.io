<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVADEV • Dashboard</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #00ff00;
}

button{
  background:#00ff00;
  border:none;
  padding:8px 15px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00cc00;
}

.container{
  padding:20px;
}

.terminal{
  border:1px solid #00ff00;
  padding:15px;
  margin-top:20px;
  height:300px;
  overflow:auto;
}

input{
  width:100%;
  background:black;
  border:none;
  color:#00ff00;
  outline:none;
  margin-top:10px;
}
</style>

<script src="auth.js"></script>
</head>

<body onload="checkAuth()">

<canvas id="matrix"></canvas>

<div class="header">
  <h2>💻 DASHBOARD</h2>

  <div>
    <button onclick="goProjects()">Projects</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <h3>🧠 System Status</h3>
  <p>ACCESS GRANTED ✅</p>

  <div class="terminal">
    <div id="output">
      <p>> system ready...</p>
    </div>

    <input id="cmd" placeholder="type command..." onkeydown="run(event)">
  </div>

</div>

<script>
// ================= MATRIX =================
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = Array(Math.floor(columns)).fill(1);

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#0f0";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(draw, 33);

// ================= TERMINAL =================
function run(e){
  if(e.key === "Enter"){
    const cmd = document.getElementById("cmd").value.trim();
    const out = document.getElementById("output");

    out.innerHTML += "<p>> " + cmd + "</p>";

    if(cmd === "help"){
      out.innerHTML += "<p>> commands: help, clear, projects, whoami</p>";
    }
    else if(cmd === "clear"){
      out.innerHTML = "";
    }
    else if(cmd === "projects"){
      window.location.href = "projects.html";
    }
    else if(cmd === "whoami"){
      out.innerHTML += "<p>> user: admin</p>";
    }
    else{
      out.innerHTML += "<p>> unknown command</p>";
    }

    document.getElementById("cmd").value = "";
    out.scrollTop = out.scrollHeight;
  }
}

// ================= NAV =================
function goProjects(){
  window.location.href = "projects.html";
}
</script>

</body>
</html>
