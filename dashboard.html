<!DOCTYPE html>
<html>
<body>

<h2>Dashboard 🎉</h2>

<p id="data">Loading...</p>

<script>
async function load() {
  const token = localStorage.getItem("token");

  const res = await fetch("http://127.0.0.1:3000/secure", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();

  document.getElementById("data").innerText = data.message + " - " + data.user;
}

load();
</script>

</body>
</html>
